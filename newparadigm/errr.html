<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select: none">
<title>0x00_HYPER_DENSE_PARASITE_RESPONSIVE</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background-color: #000000;
    overflow: hidden;
    user-select: none;
    width: 100vw;
    height: 100vh;
  }

  /* Lienzo de saturación total adaptativo */
  #dense-grid {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    font-family: 'Consolas', Courier, monospace;
    
    /* 2. Unidades dinámicas (vw) combinadas con breakpoints para consistencia */
    font-size: 0.85vw; 
    line-height: 0.7;  
    letter-spacing: -0.5px;
    white-space: pre;
    box-sizing: border-box;
    padding: 2px;
    color: #001100; 
  }

  /* 3. BREAKPOINTS RESPONSIVOS: Escalar la tipografía según el dispositivo */
  @media (max-width: 1024px) {
    #dense-grid { font-size: 1.2vw; } /* Tabletas */
  }
  @media (max-width: 768px) {
    #dense-grid { font-size: 1.6vw; letter-spacing: -0.2px; } /* Móviles grandes */
  }
  @media (max-width: 480px) {
    #dense-grid { font-size: 2.3vw; letter-spacing: 0px; } /* Móviles pequeños */
  }

  /* Estilos del parásito */
  .dim { color: #001600; }
  .active-g { color: #00ff00; }
  .active-G { color: #39ff14; text-shadow: 0 0 4px #39ff14; font-weight: bold; }
  .active-w { color: #ffffff; text-shadow: 0 0 6px #ffffff; }
  .active-r { color: #ff0000; }
  .active-inv-r { background-color: #ff0000; color: #ffffff; font-weight: bold; }
  .active-inv-g { background-color: #00ff00; color: #000000; font-weight: bold; }

  /* Estrobos */
  body.flash-red { background-color: #ff0000 !important; }
  body.flash-white { background-color: #ffffff !important; }
</style>
</head>
<body>

<pre id="dense-grid"></pre>

<script>
  const gridContainer = document.getElementById('dense-grid');
  
  const GLYPHS = '᚛᚜ᚗᚖᚕᚔΞΨΩ██▓▒░┼╬═║╚╔▲▼◄►░▄■▓/\\*+:=--01XØ█'.split('');

  const METRIC_PULSES = [120, 280, 80, 450, 110, 320, 150];
  let pulsePointer = 0;

  let state = 'feed'; 
  let nextEvent = Date.now();

  // Variables dinámicas que se recalculan según el dispositivo del usuario
  let ROWS = 0;
  let COLS = 0;
  let virtualMemory = [];

  // 4. MOTOR DE AJUSTE DINÁMICO: Mide la pantalla y calcula la cuadrícula exacta
  function setupResponsiveGrid() {
    const computedStyle = window.getComputedStyle(gridContainer);
    const fontSize = parseFloat(computedStyle.fontSize);
    
    // Proporciones geométricas aproximadas de la fuente Consolas
    const charWidth = fontSize * 0.55; 
    const charHeight = fontSize * 0.70; 

    // Asignar tamaño exacto para rellenar el 100% sin barras de scroll
    COLS = Math.floor(window.innerWidth / charWidth);
    ROWS = Math.floor(window.innerHeight / charHeight);

    // Inicializar o reconstruir la memoria de silicio
    virtualMemory = [];
    for (let r = 0; r < ROWS; r++) {
      virtualMemory[r] = [];
      for (let c = 0; c < COLS; c++) {
        virtualMemory[r][c] = `<span class="dim">${GLYPHS[Math.floor(Math.random() * GLYPHS.length)]}</span>`;
      }
    }
  }

  // Ejecución inicial y vinculación al redimensionado (rotación de pantalla en móviles)
  setupResponsiveGrid();
  window.addEventListener('resize', setupResponsiveGrid);

  function rhythmEngine() {
    const now = Date.now();

    if (now >= nextEvent) {
      const currentPulse = METRIC_PULSES[pulsePointer];
      pulsePointer = (pulsePointer + 1) % METRIC_PULSES.length;
      nextEvent = now + currentPulse;

      const r = Math.random();
      if (r < 0.6) {
        state = 'feed'; 
      } else if (r < 0.85) {
        state = 'spasm'; 
      } else {
        state = 'static'; 
      }

      document.body.className = '';
      if (state === 'spasm') {
        if (Math.random() < 0.5) document.body.classList.add('flash-red');
        else document.body.classList.add('flash-white');
      }
    }

    updateScreen();
    requestAnimationFrame(rhythmEngine);
  }

  function updateScreen() {
    if (ROWS === 0 || COLS === 0) return;

    if (state === 'spasm') {
      const loops = Math.floor(ROWS * 0.6); // Adaptar cantidad de fallos al tamaño de pantalla
      for (let i = 0; i < loops; i++) {
        let rR = Math.floor(Math.random() * ROWS);
        let rC = Math.floor(Math.random() * (COLS - 10));
        if(rC < 0) rC = 0;
        const style = Math.random() < 0.5 ? 'active-inv-r' : 'active-r';
        virtualMemory[rR][rC] = `<span class="${style}">█ERR_0x0${Math.floor(Math.random()*9)}█</span>`;
      }
    } 
    else if (state === 'static') {
      for (let r = 0; r < ROWS; r++) {
        if (Math.random() < 0.1) {
          for (let c = 0; c < COLS; c++) {
            virtualMemory[r][c] = `<span class="dim">░</span>`;
          }
        }
      }
    } 
    else if (state === 'feed') {
      const bursts = Math.floor(ROWS * 0.12);
      const segment = Math.floor(COLS * 0.15); // Longitud del bloque proporcional al ancho

      for (let i = 0; i < bursts; i++) {
        let rR = Math.floor(Math.random() * ROWS);
        let startC = Math.floor(Math.random() * (COLS - segment));
        if (startC < 0) startC = 0;
        
        let colorClass = 'active-g';
        const randColor = Math.random();
        if (randColor < 0.25) colorClass = 'active-G';
        else if (randColor < 0.35) colorClass = 'active-w';
        else if (randColor < 0.4) colorClass = 'active-inv-g';

        for (let c = startC; c < startC + segment; c++) {
          if (virtualMemory[rR] && c < COLS) {
            virtualMemory[rR][c] = `<span class="${colorClass}">${GLYPHS[Math.floor(Math.random() * GLYPHS.length)]}</span>`;
          }
        }
      }

      const cools = Math.floor((ROWS * COLS) * 0.01);
      for (let i = 0; i < cools; i++) {
        let rR = Math.floor(Math.random() * ROWS);
        let rC = Math.floor(Math.random() * COLS);
        if (virtualMemory[rR]) {
          virtualMemory[rR][rC] = `<span class="dim">${GLYPHS[Math.floor(Math.random() * GLYPHS.length)]}</span>`;
        }
      }
    }

    let finalHTML = '';
    for (let r = 0; r < ROWS; r++) {
      finalHTML += virtualMemory[r].join('') + '\n';
    }
    gridContainer.innerHTML = finalHTML;
  }

  requestAnimationFrame(rhythmEngine);
</script>
</body>
</html>
