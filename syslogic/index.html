<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANOPTIC SYSTEMS - SYSTEM_INDEX</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            color: #00ff00;
            font-family: 'Consolas', 'Courier New', monospace;
        }

        #viewport-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        #sys-header {
            width: 100%;
            padding: 10px 20px;
            background: #050505;
            border-bottom: 1px solid #00ff00;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            letter-spacing: 1px;
            z-index: 10;
        }

        #sys-right-panel {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        /* 1. FILTRO APLICADO AL IFRAME QUE RENDERIZA LOS JUEGOS Y TRANSICIONES */
        #game-runtime {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
            
           
            /* <<< AQUÍ VA EL FILTRO CSS GLOBAL >>> */
            

    /*filter: sepia(0.1) hue-rotate(60deg) saturate(5) contrast(5) brightness(0.8);*/
}
        



        /* 2. CAPA DE TEXTURA CRT Y SCANLINES (OPCIONAL SOBRE TODO EL VIEWPORT) */
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* No bloquea interactividad ni clics */
            z-index: 4;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.4) 50%
            );
            background-size: 100% 3px;
            mix-blend-mode: overlay;
            opacity: 0.7;
        }

        #glitch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 5;
            pointer-events: none;
        }

        .glitch-text {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 5px;
            animation: pulse 0.1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div id="audio-unlocker" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer;">
        <div class="glitch-text" style="font-size: 18px; color: #00ff00; font-family: 'Consolas', monospace;">[ CLICK TO INITIALIZE PANOPTIC_CORE ]</div>
    </div>

    <div id="viewport-container">
        <header id="sys-header">
            <div id="sys-title">PANOPTIC_SYS // CORE_ROUTER</div>
            <div id="sys-right-panel">
                <div id="sys-status">NODE_ID: <span id="current-node">NONE</span></div>
                <div id="sys-countdown" style="color: #ff0055; font-weight: bold;">T-MINUS: --s</div>
            </div>
        </header>

        <iframe id="game-runtime" src=""></iframe>

        <!-- 3. CAPA OVERLAY UBICADA SOBRE EL RUNTIME -->
        <div class="crt-overlay"></div>

        <div id="glitch-overlay">
            <div class="glitch-text">-- *** FATAL SYSTEM ERROR: SYSTEM_DEATH_EXCEPT ***' --</div>
        </div>
    </div>

    <script>
        const basePath = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);

        const CONFIG = {
            sequence: [
                { file: "g1.html",          codeName: "PRTCL_01_INIT",        duration: 10 }, 
                { file: "trans1_a.html",    codeName: "SYS_TRANSITION_ALPHA", duration: 5 }, 
                { file: "g2_b.html",          codeName: "NODE_02_EXEC",         duration: 10 }, 
                { file: "trans2_a.html",    codeName: "SYS_TRANSITION_ALPHA", duration: 5}, 
                { file: "g3_b.html",          codeName: "NODE_03_EXEC",         duration: 15 },
                { file: "trans3_a.html",    codeName: "SYS_TRANSITION_ALPHA", duration: 10}, 
                { file: "g4_b.html",        codeName: "NODE_04_INTR",         duration: 10 },
                { file: "2trans4_a.html",    codeName: "SYS_TRANSITION_ALPHA", duration: 10}, 
                { file: "g5_a.html",        codeName: "NODE_05_OVW",          duration: 35 },
                { file: "G6-INTRO.html",    codeName: "NODE_06_FLX",          duration: 35 },
                { file: "g7_a.html",        codeName: "NODE_07_CRIT",         duration: 15 },
                { file: "g8_a.html",        codeName: "NODE_08_WARN",         duration: 25 },
                { file: "g9_9.html",         codeName: "PRTCL_09_TERM",        duration: 10 }
            ],
            fadeTime: 4,
            defaultDuration: 45 
        };

        let currentIndex = 0;
        const runtime = document.getElementById('game-runtime');
        const overlay = document.getElementById('glitch-overlay');
        const nodeDisplay = document.getElementById('current-node');
        const countdownDisplay = document.getElementById('sys-countdown');
        const unlocker = document.getElementById('audio-unlocker');
        
        let globalTimer = null; 
        let countdownInterval = null;

        function loadNode(index) {
            if (index < 0 || index >= CONFIG.sequence.length) {
                console.warn("Fxxxxxxxxxxxxx.");
                return;
            }

            if (globalTimer) clearTimeout(globalTimer);
            if (countdownInterval) clearInterval(countdownInterval);

            currentIndex = index;
            const currentNodeData = CONFIG.sequence[currentIndex];
            const absolutePath = basePath + currentNodeData.file;

            const activeDuration = currentNodeData.duration || CONFIG.defaultDuration;

            overlay.style.display = 'flex';
            
            runtime.src = absolutePath;
            
            nodeDisplay.textContent = currentNodeData.codeName;

            runtime.onload = () => {
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, CONFIG.fadeTime);
            };

            let timeLeft = activeDuration;
            countdownDisplay.textContent = `LIFE: ${timeLeft}s`;
            countdownDisplay.style.color = "#00ff00"; 

            countdownInterval = setInterval(() => {
                timeLeft--;
                countdownDisplay.textContent = `LIFE: ${timeLeft}s`;

                if (timeLeft <= 10) {
                    countdownDisplay.style.color = (timeLeft % 2 === 0) ? "#ff0055" : "#00ff00";
                }

                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                }
            }, 1000);

            globalTimer = setTimeout(() => {
                loadNode(currentIndex + 1);
            }, activeDuration * 1000); 
        }

        window.PanopticRouter = {
            next: () => loadNode(currentIndex + 1),
            prev: () => loadNode(currentIndex - 1),
            goTo: (index) => loadNode(index),
            getCurrent: () => currentIndex
        };

        unlocker.addEventListener('click', () => {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            context.resume().then(() => {
                unlocker.style.display = 'none';
                loadNode(0);
            });
        });
    </script>
</body>
</html>
