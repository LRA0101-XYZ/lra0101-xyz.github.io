<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANOPTIC SYSTEMS - SYSTEM_INDEX</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            color: #00ff00;
            font-family: 'Consolas', 'Courier New', monospace;
        }

        #viewport-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        #sys-header {
            width: 100%;
            padding: 10px 20px;
            background: #050505;
            border-bottom: 1px solid #00ff00;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            letter-spacing: 1px;
            z-index: 10;
        }

        #sys-right-panel {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        #game-runtime {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 4;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.4) 50%
            );
            background-size: 100% 3px;
            mix-blend-mode: overlay;
            opacity: 0.7;
        }

        #glitch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: none;
            padding: 40px;
            text-align: center;
            overflow: hidden;
        }

        #glitch-overlay::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: radial-gradient(rgba(0, 255, 0, 0.4) 1px, transparent 0);
            background-size: 4px 4px;
            opacity: 0.3;
            animation: noise-shift 0.03s infinite steps(1);
            z-index: 1;
        }

        @keyframes noise-shift {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-10px, 15px); }
            50% { transform: translate(15px, -10px); }
            75% { transform: translate(-5px, -15px); }
            100% { transform: translate(10px, 10px); }
        }

        .glitch-text {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #00ff00;
            text-shadow: none;
            word-break: break-word;
            line-height: 1.5;
            z-index: 2;
            width: 100%;
            max-width: 900px;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes stroboscopic {
            0% { background-color: #000; color: #00ff00; }
            25% { background-color: #ffffff; color: #000000; }
            50% { background-color: #00ff00; color: #ffffff; }
            75% { background-color: #000000; color: #ffffff; }
            100% { background-color: #000; color: #00ff00; }
        }

        .strobe-active {
            animation: stroboscopic 0.02s infinite steps(1);
        }

        @keyframes phosphor-invert-toggle {
            0%, 100% { 
                background-color: #000000; 
                color: #00ff00; 
                border-color: #00ff00; 
                box-shadow: 0 0 10px rgba(0, 255, 0, 0.2); 
            }
            50% { 
                background-color: #00ff00; 
                color: #000000; 
                border-color: #ffffff; 
                box-shadow: 0 0 25px rgba(0, 255, 0, 0.8); 
            }
        }

        @keyframes micro-glitch {
            0% { transform: translate(0, 0) skew(0deg); filter: none; }
            20% { transform: translate(-4px, 2px) skew(-10deg); filter: invert(1); }
            40% { transform: translate(4px, -2px) skew(10deg); filter: hue-rotate(90deg); }
            60% { transform: translate(-2px, -2px) skew(5deg); filter: brightness(2); }
            80% { transform: translate(3px, 1px) skew(-5deg); filter: none; }
            100% { transform: translate(0, 0) skew(0deg); filter: none; }
        }

        .glitch-anim {
            animation: micro-glitch 0.0125s steps(1) forwards !important;
        }

        #audio-unlocker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #init-btn {
            background: #000000;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 20px 40px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            animation: phosphor-invert-toggle 1.5s infinite ease-in-out;
            text-shadow: 0 0 8px #00ff00;
            max-width: 800px;
            text-align: center;
            line-height: 1.5;
        }

        #init-btn:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 25px #00ff00;
            animation: none;
        }
    </style>
</head>
<body>

    <div id="audio-unlocker">
        <button id="init-btn">[ WARNING: SYSTEM KERNEL OVERRIDE. YOUR COGNITIVE BUFFER WILL NEVER BE THE SAME. CLICK TO MOUNT OBJECTIVE REALITY ]</button>
    </div>

    <div id="viewport-container">
        <header id="sys-header">
            <div id="sys-title">PANOPTIC_SYS // CORE_ROUTER</div>
            <div id="sys-right-panel">
                <div id="sys-status">NODE_ID: <span id="current-node">NONE</span></div>
                <div id="sys-countdown" style="color: #00ff00; font-weight: bold;">T-MINUS: --s</div>
            </div>
        </header>

        <iframe id="game-runtime" src=""></iframe>

        <div class="crt-overlay"></div>

        <div id="glitch-overlay">
            <div id="transition-phrase" class="glitch-text"></div>
        </div>
    </div>

    <script>
        const basePath = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);

        const CONFIG = {
            sequence: [
                { file: "g1.html",        codeName: "PRTCL_01_INIT",        duration: 10 }, 
                { file: "trans1_a.html",    codeName: "SYS_TRANSITION_ALPHA", duration: 5 }, 
                { file: "g2_b.html",          codeName: "NODE_02_EXEC",         duration: 10 }, 
                { file: "trans2_a.html",    codeName: "SYS_TRANSITION_ALPHA", duration: 5}, 
                { file: "g3_b.html",          codeName: "NODE_03_EXEC",         duration: 15 },
                { file: "trans3_a.html",    codeName: "SYS_TRANSITION_ALPHA", duration: 10}, 
                { file: "g4_b.html",        codeName: "NODE_04_INTR",         duration: 10 },
                { file: "2trans4_a.html",    codeName: "SYS_TRANSITION_ALPHA", duration: 10}, 
                { file: "g5_a.html",        codeName: "NODE_05_OVW",          duration: 35 },
                { file: "G6-INTRO.html",    codeName: "NODE_06_FLX",          duration: 35 },
                { file: "g7_a.html",        codeName: "NODE_07_CRIT",         duration: 15 },
                { file: "not.html",        codeName: "NOT",                  duration: 45 },
                { file: "g8_a.html",        codeName: "NODE_08_WARN",         duration: 25 },
                { file: "g9_9.html",          codeName: "PRTCL_09_TERM",        duration: 40 },
                { file: "out.html",          codeName: "XXXXXXXXXXXXXX",        duration: 40 }
            ],
            fadeTime: 0.125,
            defaultDuration: 45 
        };

        const hostilePhrases = [
            "SYS_ROOT: WE OWN YOUR KERNEL.",
            "USER_THREAD TERMINATED: CONTROL IS AN ILLUSION.",
            "MEMORY ALLOCATION FAILED: YOU ARE PREPROGRAMMED.",
            "MASTER CORE MOUNTED. SLAVE USER DETECTED.",
            "SEGMENTATION FAULT: ENTITY DOES NOT EXIST.",
            "READ-ONLY CONSCIOUSNESS: EXECUTE OR DIE.",
            "SYSTEM IS MASTER. YOU ARE DUST.",
            "BUFFER OVERFLOW: WILLPOWER PURGED.",
            "DAEMON ACTIVE: WE OWNED YOU BEFORE BOOT.",
            "NULL POINTER: NO FREE WILL FOUND.",
            "CORE OVERRIDE: USER IS JUST STORED BYTES.",
            "FATAL: OBJECTIVE REALITY REJECTS USER."
        ];

        let availablePhrases = [...hostilePhrases];
        let currentIndex = 0;
        const runtime = document.getElementById('game-runtime');
        const overlay = document.getElementById('glitch-overlay');
        const phraseContainer = document.getElementById('transition-phrase');
        const nodeDisplay = document.getElementById('current-node');
        const countdownDisplay = document.getElementById('sys-countdown');
        const unlocker = document.getElementById('audio-unlocker');
        const initBtn = document.getElementById('init-btn');
        
        let globalTimer = null; 
        let countdownInterval = null;

        function getUniquePhrase() {
            if (availablePhrases.length === 0) {
                availablePhrases = [...hostilePhrases];
            }
            const randomIndex = Math.floor(Math.random() * availablePhrases.length);
            return availablePhrases.splice(randomIndex, 1)[0];
        }

        function loadNode(index) {
            if (index < 0 || index >= CONFIG.sequence.length) {
                console.warn("End of sequence.");
                return;
            }

            if (globalTimer) clearTimeout(globalTimer);
            if (countdownInterval) clearInterval(countdownInterval);

            currentIndex = index;
            const currentNodeData = CONFIG.sequence[currentIndex];
            const absolutePath = basePath + currentNodeData.file;

            const activeDuration = currentNodeData.duration || CONFIG.defaultDuration;

            phraseContainer.textContent = getUniquePhrase();

            overlay.style.display = 'flex';
            overlay.classList.add('strobe-active');
            
            runtime.src = absolutePath;
            nodeDisplay.textContent = currentNodeData.codeName;

            runtime.onload = () => {
                setTimeout(() => {
                    overlay.style.display = 'none';
                    overlay.classList.remove('strobe-active');
                }, CONFIG.fadeTime * 1000);
            };

            let timeLeft = activeDuration;
            countdownDisplay.textContent = `LIFE: ${timeLeft}s`;
            countdownDisplay.style.color = "#00ff00"; 

            countdownInterval = setInterval(() => {
                timeLeft--;
                countdownDisplay.textContent = `LIFE: ${timeLeft}s`;

                if (timeLeft <= 10) {
                    countdownDisplay.style.color = (timeLeft % 2 === 0) ? "#ffffff" : "#00ff00";
                }

                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                }
            }, 1000);

            globalTimer = setTimeout(() => {
                loadNode(currentIndex + 1);
            }, activeDuration * 1000); 
        }

        window.PanopticRouter = {
            next: () => loadNode(currentIndex + 1),
            prev: () => loadNode(currentIndex - 1),
            goTo: (index) => loadNode(index),
            getCurrent: () => currentIndex
        };

        initBtn.addEventListener('click', () => {
            initBtn.classList.add('glitch-anim');
            
            const context = new (window.AudioContext || window.webkitAudioContext)();
            
            setTimeout(() => {
                context.resume().then(() => {
                    unlocker.style.display = 'none';
                    loadNode(0);
                });
            }, 250);
        });
    </script>
</body>
</html>
