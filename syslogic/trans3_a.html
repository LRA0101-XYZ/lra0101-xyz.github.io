<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>0x00_ALIEN_HYPER_LINK</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background-color: #000000;
    overflow: hidden;
    user-select: none;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: filter 0.04s ease-out;
  }

  #alien-terminal {
    width: 100vw;
    height: 100vh;
    font-family: 'Courier New', Courier, monospace;
    font-size: 1.1vw;
    line-height: 1.1;
    white-space: pre-wrap;
    word-break: break-all;
    box-sizing: border-box;
    padding: 30px;
    color: #00ff00;
  }

  .g { color: #00ff00; }
  .G { color: #39ff14; text-shadow: 0 0 8px #39ff14; font-weight: bold; }
  .r { color: #ff0000; }
  .R { color: #ff3333; background-color: #2a0000; font-weight: bold; }
  .w { color: #ffffff; text-shadow: 0 0 12px #ffffff; }
  .d { color: #031203; } 
  
  .inv { background-color: #00ff00; color: #000000; }
  .inv-r { background-color: #ff0000; color: #ffffff; }

  .psycho-melt {
    filter: invert(1) hue-rotate(120deg) contrast(5) saturate(10) !important;
  }
  
  .psycho-aberration {
    filter: contrast(8) skewX(-25deg) scaleY(1.3) !important;
  }

  .psycho-flash {
    background-color: #ff0000 !important;
    filter: invert(1) hue-rotate(280deg) contrast(10) !important;
  }
</style>
</head>
<body>

<div id="alien-terminal"></div>

<script>
  const term = document.getElementById('alien-terminal');
  const ALIEN_GLYPHS = '᚛᚜ᚙᚘᚗᚖᚕᚔᚕᚖᚗᚘᚙΞΨΩ██▒▒░░┼╬╦╩╦╚═╬╫╪▲▼◄►░▄■▓▒░'.split('');
  
  const ALIEN_SENTENCES = [
    "᚛ᚖᚗᚘ█╬╫╪010101ΨΩΞ█▓▒░◄►",
    "███╬╦╩╦╚═╬╫╪᚛᚜ᚙᚘᚗᚖᚕᚔᚕᚖ",
    "ΨΩΞ█▓▒░◄►᚛ᚖᚗᚘ█╬╫╪010101",
    "ᚕᚖᚗᚘᚙΞΨΩ██▒▒░░┼╬╦╩╦╚═╬╫╪▲▼",
    "᚛᚜ᚙᚘᚗᚖᚕᚔᚕᚖᚗᚘᚙΞΨΩ██▒▒░░┼╬╦╩╦╚═╬╫╪"
  ];

  let state = 'typing'; 
  let sentenceIndex = 0;
  let charIndex = 0;

  let audioCtx = null;
  let masterGain = null;
  let backgroundNoiseNode = null;
  let backgroundNoiseGain = null;
  let noiseGateGain = null; 

  const ALIEN_PITCHES = [4123, 7389, 1543, 5821, 9107, 634];

  function initAudioEngine() {
    if (audioCtx) return;
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContext({ sampleRate: 44100 });
    
    masterGain = audioCtx.createGain();
    masterGain.gain.setValueAtTime(0.35, audioCtx.currentTime); 
    masterGain.connect(audioCtx.destination);

    const bufferSize = audioCtx.sampleRate * 2;
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    let lastVal = Math.random() > 0.5 ? 1 : -1;
    for (let i = 0; i < bufferSize; i++) {
      if (i % 8 === 0) { 
        const raw = Math.random() * 2 - 1;
        lastVal = Math.round(raw * 2) / 2; 
      }
      data[i] = lastVal;
    }

    backgroundNoiseNode = audioCtx.createBufferSource();
    backgroundNoiseNode.buffer = noiseBuffer;
    backgroundNoiseNode.loop = true;

    backgroundNoiseGain = audioCtx.createGain();
    backgroundNoiseGain.gain.setValueAtTime(0.001, audioCtx.currentTime); 

    noiseGateGain = audioCtx.createGain();
    noiseGateGain.gain.setValueAtTime(0.0, audioCtx.currentTime); 

    backgroundNoiseNode.connect(backgroundNoiseGain);
    backgroundNoiseGain.connect(noiseGateGain);
    noiseGateGain.connect(masterGain);

    backgroundNoiseNode.start(0);
  }

  // --- BITCRUSH EXTREMO MODIFICADO ---
  function createBitcrushedBuffer(frequency, duration, bits, downsample, amplitude) {
    const size = Math.floor(audioCtx.sampleRate * duration);
    const buffer = audioCtx.createBuffer(1, size, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    
    const periodSamples = audioCtx.sampleRate / frequency;
    let currentSampleValue = 0;

    for (let i = 0; i < size; i++) {
      if (i % downsample === 0) {
        const phase = (i % periodSamples) / periodSamples;
        // Onda cuadrada agresiva pura
        const rawSquare = phase < 0.5 ? 1.0 : -1.0;
        
        // Cuantización matemática radical para forzar el sonido rudo
        const step = Math.pow(2, bits - 1);
        currentSampleValue = Math.round(rawSquare * step) / step * amplitude;
        
        // Inyección extra de aliasing digital asimétrico
        if (Math.random() > 0.85) {
          currentSampleValue = -currentSampleValue * 1.2;
        }
      }
      data[i] = currentSampleValue;
    }
    return buffer;
  }

  function updateAudioState(currentState) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;

    if (currentState === 'typing') {
      noiseGateGain.gain.setTargetAtTime(0.0, now, 0.005);
    } else if (currentState === 'glitch_burst') {
      noiseGateGain.gain.setTargetAtTime(1.2, now, 0.01);
    } else if (currentState === 'freeze') {
      noiseGateGain.gain.setTargetAtTime(1.5, now, 0.005);
    }
  }

  function triggerGlitchSound(intensity) {
    if (!audioCtx || audioCtx.state === 'suspended') return;
    const now = audioCtx.currentTime;

    if (intensity === 'hard') {
      const burstCount = Math.floor(Math.random() * 4) + 3;
      for (let i = 0; i < burstCount; i++) {
        const timeOffset = now + (i * 0.004);
        const duration = 0.03 + (Math.random() * 0.06);
        const freq = ALIEN_PITCHES[Math.floor(Math.random() * ALIEN_PITCHES.length)] * 0.5; // Frecuencias más bajas y destructivas
        const amp = 0.35 + (Math.random() * 0.15); 

        const crushSource = audioCtx.createBufferSource();
        // REDUCIDO A 1 BIT / DOWNSAMPLE 32: Destrucción digital absoluta para el estrobo
        crushSource.buffer = createBitcrushedBuffer(freq, duration, 1, 32, amp);

        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(1.0, timeOffset);
        gainNode.gain.setValueAtTime(0.0001, timeOffset + duration);

        crushSource.connect(gainNode);
        gainNode.connect(masterGain);
        crushSource.start(timeOffset);
        crushSource.stop(timeOffset + duration + 0.001);
      }
    } 
    else {
      const duration = 0.001 + (Math.random() * 0.002);
      const freq = ALIEN_PITCHES[Math.floor(Math.random() * ALIEN_PITCHES.length)] * 1.2;
      const amp = 0.15 + (Math.random() * 0.15);

      const crushSource = audioCtx.createBufferSource();
      // Tipeo corto pero crujiente (2 bits, downsample 8)
      crushSource.buffer = createBitcrushedBuffer(freq, duration, 2, 8, amp);

      const gainNode = audioCtx.createGain();
      gainNode.gain.setValueAtTime(1.0, now);
      gainNode.gain.setValueAtTime(0.0001, now + duration);

      crushSource.connect(gainNode);
      gainNode.connect(masterGain);
      crushSource.start(now);
      crushSource.stop(now + duration + 0.001);
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
    initAudioEngine();
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  });

  // Optimización de generación de texto: cadenas planas sin anidación excesiva de nodos DOM
  function generateNoiseRaw() {
    const fontSize = parseFloat(window.getComputedStyle(term).fontSize);
    const cols = Math.floor(term.clientWidth / (fontSize * 0.6));
    const rows = Math.floor(term.clientHeight / fontSize);
    let out = '';

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        out += Math.random() < 0.1 ? ' ' : ALIEN_GLYPHS[Math.floor(Math.random() * ALIEN_GLYPHS.length)];
      }
      out += '\n';
    }
    return out;
  }

  function brain() {
    const dice = Math.random();

    if (dice < 0.5) {
      state = 'typing';
      updateAudioState(state);
      term.innerHTML = ''; 
      term.className = '';
      document.body.className = '';
      sentenceIndex = Math.floor(Math.random() * ALIEN_SENTENCES.length);
      charIndex = 0;
      typeAlienCode();
    } 
    else if (dice < 0.88) {
      state = 'glitch_burst';
      updateAudioState(state);
      startGlitchBurst();
    } 
    else {
      state = 'freeze';
      updateAudioState(state);
      term.innerText = generateNoiseRaw();
      term.className = 'w';
      document.body.className = Math.random() < 0.6 ? 'psycho-flash' : 'psycho-aberration';
      
      triggerGlitchSound('hard');
      setTimeout(brain, Math.floor(Math.random() * 200) + 200);
    }
  }

  function typeAlienCode() {
    if (state !== 'typing') return;

    const rawSentence = ALIEN_SENTENCES[sentenceIndex];
    
    if (charIndex < rawSentence.length) {
      const color = Math.random() < 0.8 ? 'G' : 'w';
      term.innerHTML += `<span class="${color}">${rawSentence[charIndex]}</span>`;
      charIndex++;
      
      triggerGlitchSound('soft');
      setTimeout(typeAlienCode, Math.floor(Math.random() * 6) + 2);
    } else {
      term.innerHTML += '\n';
      charIndex = 0;
      sentenceIndex = (sentenceIndex + 1) % ALIEN_SENTENCES.length;

      if (Math.random() < 0.5) {
        setTimeout(brain, Math.floor(Math.random() * 200) + 100);
      } else {
        setTimeout(typeAlienCode, 30);
      }
    }
  }

  // --- OPTIMIZACIÓN DEL ESTROBO CON REQUESTANIMATIONFRAME ---
  function startGlitchBurst() {
    let framesRendered = 0;
    const totalFrames = Math.floor(Math.random() * 20) + 15; 
    let lastRenderTime = 0;
    const frameInterval = 25; // Control estricto de velocidad en milisegundos

    function loop(timestamp) {
      if (state !== 'glitch_burst') return;

      if (!lastRenderTime) lastRenderTime = timestamp;
      const delta = timestamp - lastRenderTime;

      if (delta >= frameInterval) {
        lastRenderTime = timestamp;
        
        // Uso de innerText en lugar de HTML pesado para evitar el lag de reflow
        term.innerText = generateNoiseRaw();

        if (Math.random() > 0.25) {
          triggerGlitchSound('hard');
        }

        document.body.className = '';
        const fx = Math.random();
        
        if (fx < 0.55) { 
          document.body.classList.add('psycho-flash');
        } else if (fx < 0.65) {
          document.body.classList.add('psycho-aberration');
        } else {
          document.body.classList.add('psycho-melt');
        }

        framesRendered++;
      }

      if (framesRendered < totalFrames) {
        requestAnimationFrame(loop);
      } else {
        brain(); 
      }
    }

    requestAnimationFrame(loop);
  }

  brain();
</script>
</body>
</html>
