<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;cursor:crosshair;font-family:'Consolas', 'Courier New', monospace;}

/* CRT AND GLITCH EFFECTS */
#sl{position:fixed;inset:0;z-index:900;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0.15) 0,rgba(0,0,0,0.15) 1px,transparent 1px,transparent 3px);
  animation:fl 0.07s steps(1) infinite;}
@keyframes fl{ 0%{opacity:1}8%{opacity:.8}18%{opacity:1}32%{opacity:.88}47%{opacity:1}55%{opacity:.75}66%{opacity:1}77%{opacity:.9}88%{opacity:1}100%{opacity:.94} }
#vg{position:fixed;inset:0;z-index:899;pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%,transparent 25%,rgba(0,0,0,.95) 100%);}

/* SCANLINE */
#scanline {
  position: fixed; top: 0; left: 0; right: 340px; height: 15px;
  background: linear-gradient(to bottom, transparent, rgba(51, 255, 80, 0.4), transparent);
  box-shadow: 0 0 20px rgba(51, 255, 80, 0.8);
  opacity: 0.7; z-index: 850; pointer-events: none;
  animation: scan 5s linear infinite;
}
@keyframes scan { 0% { top: -20px; } 100% { top: 100%; } }

/* GLITCH OVERLAYS */
#glitch-ov{position:fixed;inset:0;z-index:951;pointer-events:none;opacity:0;mix-blend-mode:screen;}
#ansi-overlay {
  position: fixed; inset: 0; z-index: 850; 
  background: rgba(0, 5, 0, 0.95); color: #33ff55; 
  font-size: 28px; line-height: 26px; letter-spacing: 6px;
  font-weight: bold; overflow: hidden; opacity: 0; pointer-events: none;
  white-space: pre-wrap; word-break: break-all;
}
.ansi-rgb-glitch { animation: rgbTear 0.05s infinite; }
@keyframes rgbTear {
  0%   { text-shadow:  6px 0 rgba(255,0,0,0.9), -6px 0 rgba(0,255,255,0.9); transform: scale(1.05) translate(3px, 2px); }
  25%  { text-shadow: -8px 3px rgba(255,0,0,0.9), 8px -3px rgba(0,255,0,0.9); transform: scale(1.02) translate(-4px, -1px); }
  50%  { text-shadow:  5px -6px rgba(0,0,255,0.9), -5px 6px rgba(255,0,0,0.9); transform: scale(1.08) translate(5px, -3px); }
  75%  { text-shadow: -6px 0 rgba(0,255,0,0.9),  6px 0 rgba(255,0,255,0.9); transform: scale(1.04) translate(-3px, 4px); }
  100% { text-shadow:  4px 3px rgba(255,0,0,0.9), -4px -3px rgba(0,255,255,0.9); transform: scale(1.06) translate(2px, -2px); }
}

#shining-overlay {
  position: fixed; top: 12%; left: 4%; width: calc(100% - 340px); height: 75%;
  z-index: 850; pointer-events: none; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-start;
}
.shining-row { font-size: 30px; line-height: 1.1; font-weight: bold; letter-spacing: -0.5px; white-space: nowrap; text-transform: uppercase; width: 100%; opacity: 0.85; }
.scroll-mode { animation: txtScroll 20s linear infinite; }
@keyframes txtScroll { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }

/* TRUE 3D CANVAS */
#c { position:absolute; top:0; left:0; width:100%; height:100%; z-index:10; }

/* UI PANELS */
#panel{ position:fixed;right:0;top:0;bottom:0;width:340px; border-left:1px solid rgba(255,255,255,0.1); background:rgba(2,10,2,0.98); z-index:800; display:flex;flex-direction:column; }
#panel-top{padding:20px 20px 0;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;}
.p-sys{font-size:10px;letter-spacing:4px;color:rgba(51,255,80,0.6);margin-bottom:12px;} 
.p-title{font-size:14px;letter-spacing:3px;color:#fff;padding-bottom:15px;text-shadow: 0 0 5px #33ff55;} 
#panel-content{flex:1;padding:20px;display:flex;flex-direction:column; font-size:12px; color:#33ff55; line-height: 1.5; letter-spacing: 1px; overflow:hidden;}

/* QUOTE LOGS / PATTERNS */
#quote-log {
  flex: 1; margin-top: 15px; border-top: 1px solid rgba(51,255,80,0.3); padding-top: 15px;
  overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
}
.quote-entry { animation: fadeInRight 0.3s ease-out forwards; opacity: 0; transform: translateX(20px); border-left: 2px solid; padding-left: 8px; margin-bottom: 4px; }
.quote-time { color: rgba(255,255,255,0.7); margin-right: 5px; font-size: 10px; }
.pattern-id { font-weight: bold; }
@keyframes fadeInRight { to { opacity: 1; transform: translateX(0); } }

#bbar{position:fixed;bottom:0;left:0;right:340px;height:40px;border-top:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.96);z-index:800;display:flex;align-items:center;padding:0 25px;gap:20px;} 
.bb{font-size:11px;letter-spacing:2.5px;color:rgba(255,255,255,0.5);} 
.bb span{color:#33ff55;margin-left:8px;font-weight:bold;}

.stat-row { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid rgba(51,255,80,0.2); padding-bottom: 5px; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); }
::-webkit-scrollbar-thumb { background: #33ff55; }

<script>
// --- GLITCH TEXTS & SYMBOLS ---
const SENTENCES=[
  'IT KNOWS YOU ARE WATCHING ', 'SIGNAL RECEIVED BEFORE TRANSMISSION ', 'THE NETWORK IS DREAMING ',
  'COORDINATES DO NOT EXIST ON ANY MAP ', 'OBSERVER EFFECT INVERTED ', 'ENTITY DOES NOT CAST SHADOW ',
  'CLOCK DESYNCHRONIZED — IMPOSSIBLE ', 'TRANSMISSION ORIGIN: SELF ', 'WARNING — CONTACT IS AWARE OF SCAN ',
  'RECURSIVE LOOP DETECTED IN TIMELINE ', 'DISTANCE DECREASING ', 'THE ECHO IS GETTING LOUDER '
];
const CURRENCY_SYMBOLS = ['$', '€', '£', '¥', '₿', '₩', '₽', '₹', '█', '▓', '▒', '░'];

let clickGlitchActive = false, clickGlitchTimer = 0;
let phraseGlitchActive = false, phraseGlitchTimer = 0;
let glitchIntensity = 0;
let collisionGlitchIntensity = 0; 
let activeTypingIntervals = [];
let ansiAnimInterval = null;
let microGlitchTimer = 0;

// --- AUDIO ENGINE ---
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;
let masterGain;
let audioInitialized = false;

// Audio variables
let breathFilter, breathLFO, droneFilter;
let accOsc, accFilter; 
let mx=0, my=0, lastMx=0, lastMy=0; 

function initAudio() {
  if (audioInitialized) {
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    return;
  }
  
  audioCtx = new AudioContext();
  masterGain = audioCtx.createGain(); 
  masterGain.gain.value = 0.5; 
  masterGain.connect(audioCtx.destination);
  
  startMachineBreathing(); 
  startAcceleratorEngine();
  scheduleNextGlitch();
  scheduleSporadicInterference();
  
  audioInitialized = true;

  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

// Inicialización AUTOMÁTICA al cargar la página
window.addEventListener('DOMContentLoaded', initAudio);
window.addEventListener('load', initAudio);

// Respaldo de seguridad por si el navegador bloquea el Autoplay hasta cualquier gesto
window.addEventListener('mousedown', initAudio);
window.addEventListener('keydown', initAudio);
window.addEventListener('touchstart', initAudio);

function createBitCrushCurve(bits) {
    const levels = Math.pow(2, bits); const curve = new Float32Array(4096);
    for (let i = 0; i < 4096; i++) { let x = (i * 2) / 4096 - 1; curve[i] = Math.round(x * levels) / levels; } return curve;
}

function startMachineBreathing() {
  const bufferSize = audioCtx.sampleRate * 2;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const breathNoise = audioCtx.createBufferSource();
  breathNoise.buffer = buffer; breathNoise.loop = true;

  breathFilter = audioCtx.createBiquadFilter();
  breathFilter.type = 'bandpass'; breathFilter.frequency.value = 300; breathFilter.Q.value = 1.0;

  const drone = audioCtx.createOscillator(); drone.type = 'sawtooth'; drone.frequency.value = 45; 
  droneFilter = audioCtx.createBiquadFilter(); droneFilter.type = 'lowpass'; droneFilter.frequency.value = 200;

  const breathGain = audioCtx.createGain(); breathGain.gain.value = 0.5;
  breathLFO = audioCtx.createOscillator(); breathLFO.type = 'sine'; breathLFO.frequency.value = 0.15; 

  const lfoVolMod = audioCtx.createGain(); lfoVolMod.gain.value = 0.4;
  breathLFO.connect(lfoVolMod).connect(breathGain.gain);

  breathNoise.connect(breathFilter).connect(breathGain);
  drone.connect(droneFilter).connect(breathGain);
  breathGain.connect(masterGain);

  breathNoise.start(); drone.start(); breathLFO.start();
}

function startAcceleratorEngine() {
  accOsc = audioCtx.createOscillator();
  accOsc.type = 'sawtooth';
  accOsc.frequency.value = 30; 
  
  accFilter = audioCtx.createBiquadFilter();
  accFilter.type = 'lowpass';
  accFilter.frequency.value = 100;
  
  const accGain = audioCtx.createGain();
  accGain.gain.value = 0.05; 
  
  accOsc.connect(accFilter).connect(accGain).connect(masterGain);
  accOsc.start();
}

function revAccelerator(delta) {
  if(!audioInitialized || !audioCtx) return;
  const targetFreq = delta < 0 ? 300 : 80;
  const targetCutoff = delta < 0 ? 3000 : 500;
  
  accOsc.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);
  accFilter.frequency.setTargetAtTime(targetCutoff, audioCtx.currentTime, 0.1);
  
  setTimeout(() => {
    accOsc.frequency.setTargetAtTime(30, audioCtx.currentTime, 0.4);
    accFilter.frequency.setTargetAtTime(100, audioCtx.currentTime, 0.4);
  }, 150);
}

function playSwipeSound() {
  if(!audioInitialized || !audioCtx || audioCtx.state !== 'running') return;
  const now = audioCtx.currentTime;
  const bufferSize = audioCtx.sampleRate * 0.3; 
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass'; filter.Q.value = 10;
  filter.frequency.setValueAtTime(6000, now);
  filter.frequency.exponentialRampToValueAtTime(300, now + 0.2); 

  const env = audioCtx.createGain();
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(0.7, now + 0.02);
  env.gain.exponentialRampToValueAtTime(0.001, now + 0.3);

  noise.connect(filter).connect(env).connect(masterGain);
  noise.start(now);
}

function playInterferenceGlitch() {
  if(!audioInitialized || !audioCtx || audioCtx.state !== 'running') return;
  const now = audioCtx.currentTime;
  const dur = 0.1 + Math.random() * 0.2; 

  const osc = audioCtx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(50, now);
  osc.frequency.linearRampToValueAtTime(1500, now + dur/2);
  osc.frequency.linearRampToValueAtTime(50, now + dur);

  const crusher = audioCtx.createWaveShaper();
  crusher.curve = createBitCrushCurve(1.5); 

  const env = audioCtx.createGain();
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(0.2, now + 0.02);
  
  for(let i=0.02; i<dur; i+=0.04) {
      env.gain.setValueAtTime(Math.random() * 0.3, now + i);
  }
  env.gain.linearRampToValueAtTime(0.001, now + dur);

  osc.connect(crusher).connect(env).connect(masterGain);
  osc.start(now); osc.stop(now + dur);
  
  microGlitchTimer = 10;
}

function scheduleSporadicInterference() {
  if (audioInitialized) {
      setTimeout(() => {
          playInterferenceGlitch();
          scheduleSporadicInterference();
      }, 5000 + Math.random() * 15000); 
  }
}

function playCellInteraction(changesCount) {
  if(!audioInitialized || !audioCtx || audioCtx.state !== 'running' || changesCount === 0) return;
  const numGrains = Math.min(changesCount, 12); 
  const now = audioCtx.currentTime;

  for (let i = 0; i < numGrains; i++) {
    const offset = now + (Math.random() * 0.1); 
    const osc = audioCtx.createOscillator(); osc.type = 'square'; 
    osc.frequency.setValueAtTime(1500 + Math.random() * 2000, offset); osc.frequency.exponentialRampToValueAtTime(100, offset + 0.02);
    const env = audioCtx.createGain(); env.gain.setValueAtTime(0, offset); env.gain.linearRampToValueAtTime(0.1, offset + 0.001); env.gain.exponentialRampToValueAtTime(0.001, offset + 0.02); 
    const panner = audioCtx.createStereoPanner(); panner.pan.value = (Math.random() * 2) - 1;
    osc.connect(env).connect(panner).connect(masterGain); osc.start(offset); osc.stop(offset + 0.03);
  }
  if (changesCount > 8) collisionGlitchIntensity = Math.min(1.0, changesCount / 40);
}

function playSolenoidClick() {
  if(!audioInitialized || !audioCtx || audioCtx.state !== 'running') return;
  const now = audioCtx.currentTime;
  const impacts = 2 + Math.floor(Math.random() * 3); 
  for (let i = 0; i < impacts; i++) {
    const offset = now + (i * (0.05 + Math.random() * 0.05)); 
    const osc = audioCtx.createOscillator(); osc.type = Math.random() > 0.5 ? 'square' : 'sawtooth'; 
    const startFreq = 100 + Math.random() * 400; const endFreq = 20 + Math.random() * 30;
    osc.frequency.setValueAtTime(startFreq, offset); osc.frequency.exponentialRampToValueAtTime(endFreq, offset + 0.05); 
    const env = audioCtx.createGain(); env.gain.setValueAtTime(0, offset); env.gain.linearRampToValueAtTime(0.4 + Math.random() * 0.4, offset + 0.01); env.gain.exponentialRampToValueAtTime(0.001, offset + 0.1 + Math.random() * 0.1); 
    osc.connect(env).connect(masterGain); osc.start(offset); osc.stop(offset + 0.2);

    const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    for(let j=0; j<noiseBuffer.length; j++) output[j] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource(); noise.buffer = noiseBuffer;
    const noiseFilter = audioCtx.createBiquadFilter(); noiseFilter.type = 'bandpass'; 
    noiseFilter.frequency.value = 500 + Math.random() * 2000; noiseFilter.Q.value = 5 + Math.random() * 15; 
    const noiseEnv = audioCtx.createGain(); noiseEnv.gain.setValueAtTime(0.5 + Math.random() * 0.5, offset); noiseEnv.gain.exponentialRampToValueAtTime(0.001, offset + 0.1 + Math.random() * 0.1);
    noise.connect(noiseFilter).connect(noiseEnv).connect(masterGain); noise.start(offset);
  }
}

function playTotalBitcrushFailure() {
  if(!audioInitialized || !audioCtx || audioCtx.state !== 'running') return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator(); osc.type = 'square';
  osc.frequency.setValueAtTime(100, now); osc.frequency.setTargetAtTime(8000, now, 0.05); osc.frequency.setTargetAtTime(10, now + 0.1, 0.02); 
  const lfo = audioCtx.createOscillator(); lfo.type = 'square'; lfo.frequency.value = 180; 
  const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 5000; lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
  const crusher = audioCtx.createWaveShaper(); crusher.curve = createBitCrushCurve(1.5); 
  const env = audioCtx.createGain(); env.gain.setValueAtTime(0.001, now); env.gain.linearRampToValueAtTime(1.5, now + 0.01); env.gain.exponentialRampToValueAtTime(0.001, now + 0.3); 
  osc.connect(crusher); crusher.connect(env); env.connect(masterGain);
  osc.start(now); lfo.start(now); osc.stop(now + 0.4); lfo.stop(now + 0.4);
}

// --- GLITCH VISUAL FUNCTIONS ---
function triggerDistortion(sentence) {
  clickGlitchActive = true; clickGlitchTimer = 25; 
  activeTypingIntervals.forEach(clearInterval); activeTypingIntervals = []; 
  const shiningOverlay = document.getElementById('shining-overlay');
  shiningOverlay.innerHTML = ''; 
  const totalRows = 14; 
  for(let i = 0; i < totalRows; i++) {
    const row = document.createElement('div'); row.className = 'shining-row'; let roll = Math.random();
    if(roll > 0.75) { row.style.color = 'rgba(255, 32, 32, 0.85)'; row.style.textShadow = '3px 0px rgba(0,255,255,0.9), -2px 0px rgba(255,255,0,0.6)'; } 
    else if (roll > 0.35) { row.style.color = 'rgba(51, 255, 80, 0.7)'; row.style.textShadow = '1px 1px rgba(255,0,0,0.8)'; } 
    else { row.style.color = `rgba(51, 255, 80, ${Math.random() * 0.25 + 0.08})`; }
    
    row.style.paddingLeft = `${Math.floor(Math.random() * 50) - 25}px`;
    if(i % 2 === 0) { 
        row.innerHTML = `<span>${sentence.repeat(5)}</span><br><span>${sentence.repeat(5)}</span>`; 
        shiningOverlay.appendChild(row); 
    } else { 
        shiningOverlay.appendChild(row); 
        let fullText = sentence.repeat(4); let currentIdx = 0; 
        const interval = setInterval(() => { 
            if(currentIdx <= fullText.length) { row.textContent = fullText.substring(0, currentIdx); currentIdx += Math.floor(Math.random() * 2) + 1; } 
            else { clearInterval(interval); } 
        }, Math.floor(Math.random() * 25) + 10); 
        activeTypingIntervals.push(interval); 
    }
  }
  setTimeout(() => { Array.from(shiningOverlay.children).forEach(child => { child.style.transition = 'opacity 1.5s ease-out'; child.style.opacity = '0'; }); }, 1600);
}

function triggerAnsiGlitch() {
  if(!audioInitialized) return;
  playTotalBitcrushFailure(); 
  clickGlitchActive = true; clickGlitchTimer = 30; glitchIntensity = 2.0; 
  
  const ansiOverlay = document.getElementById('ansi-overlay');
  ansiOverlay.style.inset = '0'; 
  ansiOverlay.className = 'ansi-rgb-glitch'; 
  ansiOverlay.style.color = '#33ff55'; 
  ansiOverlay.style.opacity = 1;
  
  const charCount = 2000; 
  const renderChaos = () => { 
      let content = ''; 
      for(let i=0; i<charCount; i++) content += CURRENCY_SYMBOLS[Math.floor(Math.random() * CURRENCY_SYMBOLS.length)]; 
      ansiOverlay.textContent = content; 
  };
  renderChaos(); 
  if(ansiAnimInterval) clearInterval(ansiAnimInterval); 
  ansiAnimInterval = setInterval(renderChaos, 50);
  
  setTimeout(() => { 
      ansiOverlay.style.opacity = 0; ansiOverlay.className = ''; clearInterval(ansiAnimInterval); 
  }, 300 + Math.random() * 350); 
}

function scheduleNextGlitch() { 
  if(audioInitialized) { setTimeout(() => { triggerAnsiGlitch(); scheduleNextGlitch(); }, 6000 + Math.random() * 8000); } 
}

// --- LOGGING SYSTEM ---
let indexedCount = 0;
let lastLogTick = {}; 

function logBehavior(type, name, color, x, y) {
  if (lastLogTick[name] && generation - lastLogTick[name] < 20) return;
  lastLogTick[name] = generation;
  
  playSwipeSound();
  
  indexedCount++;
  document.getElementById('indexed-ui').textContent = indexedCount;

  const log = document.getElementById('quote-log');
  const el = document.createElement('div');
  el.className = 'quote-entry';
  el.style.borderColor = color;
  
  const time = new Date().toLocaleTimeString('en-US', {hour12:false});
  el.innerHTML = `
    <span class="quote-time">[${time}]</span><br>
    <span style="color:${color}; font-weight:bold;">> [${type}] DETECTED</span><br>
    <span style="color:#aaa;">BEHAVIOR:</span> <span class="pattern-id" style="color:#fff;">${name}</span>
  `;
  
  log.appendChild(el);
  if(log.children.length > 30) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
}

// --- MULTI-COLORED DICTIONARY ---
const DICTIONARY = [
  { type: 'STAGNATION', name: 'SOCIAL_ISOLATION_BLOCK', w: 2, h: 2, sig: '1111', color: '#ff2020' }, // Red
  { type: 'OSCILLATION', name: 'ECHO_CHAMBER_HORIZONTAL', w: 3, h: 1, sig: '111', color: '#00ffff' }, // Cyan
  { type: 'OSCILLATION', name: 'ECHO_CHAMBER_VERTICAL', w: 1, h: 3, sig: '111', color: '#00ffff' }, // Cyan
  { type: 'MIGRATION', name: 'VIRAL_PROPAGATION', w: 3, h: 3, sig: '010001111', color: '#ff20ff' }, // Magenta
  { type: 'MIGRATION', name: 'VIRAL_PROPAGATION', w: 3, h: 3, sig: '101011010', color: '#ff20ff' }, 
  { type: 'MIGRATION', name: 'VIRAL_PROPAGATION', w: 3, h: 3, sig: '001101011', color: '#ff20ff' },
  { type: 'MIGRATION', name: 'VIRAL_PROPAGATION', w: 3, h: 3, sig: '100011110', color: '#ff20ff' },
  { type: 'MIGRATION', name: 'VIRAL_PROPAGATION_INV', w: 3, h: 3, sig: '111100010', color: '#ff20ff' }
];

// --- TRUE 3D PROJECTION ENGINE ---
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, CX, CY;

const CELL_SIZE = 14;
const Z_SPACING = 40; 
const HISTORY_LAYERS = 8; 

let gridHistory = [];
let cols, rows;

let generation = 0;
let isPaused = false;
let isDrawing = false;
let frameCount = 0;
const framesPerGen = 5;

// Camera System (Free Orbit & Deep Zoom)
let targetZoom = 1.0;
let currentZoom = 1.0;
let camAngleX = 0, targetAngleX = 0;
let camAngleY = 0, targetAngleY = 0;
const CAM_DIST = 1000;
const FOV_BASE = 800;

function dprResize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth - 340; 
  H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  CX = W / 2; CY = H / 2;
  
  cols = Math.floor(2500 / CELL_SIZE); 
  rows = Math.floor(2500 / CELL_SIZE);

  if (gridHistory.length === 0) {
      for(let i=0; i<HISTORY_LAYERS; i++) {
        gridHistory.push(new Array(cols).fill(null).map(() => new Array(rows).fill(0)));
      }
      const cx = Math.floor(cols/2); const cy = Math.floor(rows/2);
      for(let i=-20; i<20; i++){
          for(let j=-20; j<20; j++){
              if(Math.random() > 0.6) gridHistory[0][cx+i][cy+j] = 1;
          }
      }
  }
}
window.addEventListener('resize', dprResize);
dprResize();

function project3D(x, y, z) {
  let y1 = y * Math.cos(camAngleX) - z * Math.sin(camAngleX); 
  let z1 = y * Math.sin(camAngleX) + z * Math.cos(camAngleX);
  
  let x2 = x * Math.cos(camAngleY) - z1 * Math.sin(camAngleY); 
  let z2 = x * Math.sin(camAngleY) + z1 * Math.cos(camAngleY);
  
  z2 += CAM_DIST; 
  let scale = 0; 
  if(z2 > 10) scale = (FOV_BASE * currentZoom) / z2; 
  
  return { x: CX + (x2 * scale), y: CY + (y1 * scale), s: scale };
}

function getSig(grid, x, y, w, h) {
  let s = '';
  for(let j=0; j<h; j++){
    for(let i=0; i<w; i++){ s += grid[x+i][y+j]; }
  }
  return s;
}

function scanPatterns() {
  const currentGrid = gridHistory[0];
  let foundPatterns = [];

  for(let x=0; x < cols - 3; x++) {
    for(let y=0; y < rows - 3; y++) {
      if(currentGrid[x][y] === 0 && currentGrid[x+1][y] === 0 && currentGrid[x][y+1] === 0) continue;
      for(let p of DICTIONARY) {
        if(getSig(currentGrid, x, y, p.w, p.h) === p.sig) {
          foundPatterns.push({ x: x, y: y, def: p });
          logBehavior(p.type, p.name, p.color, x, y);
        }
      }
    }
  }
  return foundPatterns;
}

function evolve() {
  let currentGrid = gridHistory[0];
  let nextGrid = new Array(cols).fill(null).map(() => new Array(rows).fill(0));
  let pop = 0;
  let changes = 0;

  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      let state = currentGrid[i][j];
      let neighbors = 0;
      
      for(let dx=-1; dx<=1; dx++) {
        for(let dy=-1; dy<=1; dy++) {
           if(dx===0 && dy===0) continue;
           let nx = (i + dx + cols) % cols;
           let ny = (j + dy + rows) % rows;
           neighbors += currentGrid[nx][ny];
        }
      }

      if (state === 0 && neighbors === 3) { nextGrid[i][j] = 1; pop++; changes++; } 
      else if (state === 1 && (neighbors < 2 || neighbors > 3)) { nextGrid[i][j] = 0; changes++; } 
      else { nextGrid[i][j] = state; if(state===1) pop++; }
    }
  }

  if(changes > 0) playCellInteraction(changes);

  gridHistory.pop(); 
  gridHistory.unshift(nextGrid);
  
  generation++;
  document.getElementById('gen-ui').textContent = generation;
  document.getElementById('pop-ui').textContent = pop;
}

function drawLoop() {
  camAngleX += (targetAngleX - camAngleX) * 0.1;
  camAngleY += (targetAngleY - camAngleY) * 0.1;
  currentZoom += (targetZoom - currentZoom) * 0.1;

  if(microGlitchTimer > 0) {
      ctx.fillStyle = `rgba(${50 + Math.random()*50}, ${100 + Math.random()*50}, 0, 0.9)`;
      microGlitchTimer--;
  } else if(collisionGlitchIntensity > 0.1 || clickGlitchActive || phraseGlitchActive) {
      ctx.fillStyle = `rgba(0, ${5 + Math.random()*20}, 0, 0.9)`;
      collisionGlitchIntensity *= 0.8;
  } else {
      ctx.fillStyle = 'rgba(0, 3, 0, 0.95)';
  }
  ctx.fillRect(0, 0, W, H);

  // --- 3D Z-SORTING ---
  let layersOrder = [];
  for(let k = 0; k < HISTORY_LAYERS; k++) {
      let pCenter = project3D(0, 0, k * Z_SPACING); 
      layersOrder.push({ index: k, depth: pCenter.s }); 
  }
  layersOrder.sort((a, b) => a.depth - b.depth); 

  for (let l of layersOrder) {
      let k = l.index;
      let grid = gridHistory[k];
      let nextGrid = k > 0 ? gridHistory[k-1] : null;

      let alpha = 0.1 + (1 - k/HISTORY_LAYERS) * 0.4;
      ctx.fillStyle = k === 0 ? 'rgba(51, 255, 80, 0.95)' : `rgba(51, 255, 80, ${alpha})`;
      
      for (let i = 0; i < cols; i++) {
          for (let j = 0; j < rows; j++) {
              if (grid[i][j] === 1) {
                  let wx = (i - cols/2) * CELL_SIZE;
                  let wy = (j - rows/2) * CELL_SIZE;
                  let wz = k * Z_SPACING;

                  let p1 = project3D(wx, wy, wz);

                  if (p1.s > 0) {
                      let size = CELL_SIZE * p1.s * 0.8;
                      
                      if (k === 0) {
                          ctx.shadowBlur = 15 * p1.s;
                          ctx.shadowColor = '#33ff55';
                          ctx.fillRect(p1.x - size/2, p1.y - size/2, size, size);
                          ctx.shadowBlur = 0; 
                      } else {
                          ctx.fillRect(p1.x - size/2, p1.y - size/2, size, size);
                      }

                      if (nextGrid && nextGrid[i][j] === 1) {
                          let p2 = project3D(wx, wy, wz - Z_SPACING);
                          if(p2.s > 0) {
                              ctx.lineWidth = 1.2 * p1.s;
                              ctx.strokeStyle = `rgba(255, 255, 255, ${alpha * 0.8})`; 
                              ctx.beginPath();
                              ctx.moveTo(p1.x, p1.y);
                              ctx.lineTo(p2.x, p2.y);
                              ctx.stroke();
                          }
                      }
                  }
              }
          }
      }
  }

  if (!isPaused) {
    let patterns = scanPatterns();
    patterns.forEach(pt => {
      let wx = (pt.x - cols/2) * CELL_SIZE;
      let wy = (pt.y - rows/2) * CELL_SIZE;
      let ww = pt.def.w * CELL_SIZE;
      let wh = pt.def.h * CELL_SIZE;

      let p = project3D(wx + ww/2, wy + wh/2, 0); 
      if(p.s > 0) {
          ctx.strokeStyle = pt.def.color;
          ctx.shadowBlur = 10 * p.s;       
          ctx.shadowColor = pt.def.color;  
          ctx.lineWidth = 3 * p.s;         
          ctx.beginPath();
          let sx = (ww/2 + 6) * p.s;
          let sy = (wh/2 + 6) * p.s;
          ctx.rect(p.x - sx, p.y - sy, sx*2, sy*2);
          ctx.stroke();
          ctx.shadowBlur = 0; 
      }
    });
  }

  if(clickGlitchActive){ clickGlitchTimer--; glitchIntensity = clickGlitchTimer / 30; if(clickGlitchTimer <= 0) { clickGlitchActive = false; } }
  if(phraseGlitchActive){ phraseGlitchTimer--; glitchIntensity = phraseGlitchTimer / 5; if(phraseGlitchTimer <= 0) phraseGlitchActive = false; }
  
  if(clickGlitchActive || phraseGlitchActive) {
      const glitchOv = document.getElementById('glitch-ov');
      glitchOv.style.opacity = glitchIntensity * 0.85; 
      glitchOv.style.background = `radial-gradient(circle, rgba(255,0,0,0.2) 0%, rgba(0,255,0,0.15) 50%, rgba(0,0,255,0.2) 100%)`; 
  } else {
      document.getElementById('glitch-ov').style.opacity = 0;
  }

  if(audioInitialized && breathFilter && droneFilter && audioCtx) {
    let dx = mx - lastMx; let dy = my - lastMy; 
    let mouseSpeed = Math.sqrt(dx*dx + dy*dy); 
    breathFilter.frequency.setTargetAtTime(300 + (mouseSpeed * 10000), audioCtx.currentTime, 0.1); 
    droneFilter.frequency.setTargetAtTime(200 + (mouseSpeed * 2000), audioCtx.currentTime, 0.1);
    breathLFO.frequency.setTargetAtTime(0.15 + (mouseSpeed * 3), audioCtx.currentTime, 0.5);
    lastMx = mx; lastMy = my;
  }

  document.getElementById('tilt-ui').textContent = `${Math.round(camAngleX * 180/Math.PI)}°/${Math.round(camAngleY * 180/Math.PI)}°`;
  document.getElementById('zoom-ui').textContent = currentZoom.toFixed(2) + 'x';

  if (!isPaused && !isDrawing) {
      frameCount++;
      if (frameCount >= framesPerGen) { evolve(); frameCount = 0; }
  }
  requestAnimationFrame(drawLoop);
}
drawLoop();

// --- FREE ORBIT CAMERA & ZOOM CONTROLS ---
let isDraggingCam = false;
let autoSpinY = 0.001; 
let autoSpinX = 0.0005;

document.addEventListener('mousedown', (e) => {
    if (e.button === 2 || e.shiftKey) isDraggingCam = true;
});

document.addEventListener('mouseup', () => { isDraggingCam = false; });
document.addEventListener('contextmenu', e => e.preventDefault());

document.addEventListener('mousemove', (e) => {
    mx = (e.clientX / window.innerWidth) - 0.5;
    my = (e.clientY / window.innerHeight) - 0.5;
    
    if (e.clientX > window.innerWidth - 340) return; 

    if (isDraggingCam) {
        targetAngleY += e.movementX * 0.005;
        targetAngleX -= e.movementY * 0.005;
    } else {
        targetAngleY += autoSpinY;
        targetAngleX += autoSpinX;
    }
});

document.addEventListener('wheel', (e) => {
    if (e.clientX > window.innerWidth - 340) return; 
    revAccelerator(e.deltaY);
    targetZoom += e.deltaY * -0.002;
    targetZoom = Math.max(0.3, Math.min(targetZoom, 10.0)); 
});

// --- 3D INJECTION CLICKS ---
canvas.addEventListener('mousedown', (e) => {
    if (e.button === 2 || e.shiftKey) return; 
    isDrawing = true;
    playSolenoidClick();
    injectMatter3D(e);
    if(Math.random() > 0.75) triggerDistortion(SENTENCES[Math.floor(Math.random()*SENTENCES.length)]);
});

canvas.addEventListener('mousemove', (e) => {
    if(isDrawing) {
        if(Math.random() > 0.6) playSolenoidClick();
        injectMatter3D(e);
    }
});

window.addEventListener('mouseup', () => { isDrawing = false; });

function injectMatter3D(e) {
  let hitCol = -1, hitRow = -1, minDist = 40; 
  for(let i=0; i<cols; i++) {
      for(let j=0; j<rows; j++) {
          let wx = (i - cols/2) * CELL_SIZE;
          let wy = (j - rows/2) * CELL_SIZE;
          let p = project3D(wx, wy, 0);
          
          if(p.s > 0) {
              let d = Math.hypot(e.clientX - p.x, e.clientY - p.y);
              if (d < minDist) { minDist = d; hitCol = i; hitRow = j; }
          }
      }
  }

  if(hitCol !== -1 && hitRow !== -1) {
      gridHistory[0][hitCol][hitRow] = 1;
      if(hitCol+1 < cols) gridHistory[0][hitCol+1][hitRow] = 1;
      if(hitRow+1 < rows) gridHistory[0][hitCol][hitRow+1] = Math.random() > 0.5 ? 1 : 0;
      if(hitCol-1 >= 0) gridHistory[0][hitCol-1][hitRow] = Math.random() > 0.5 ? 1 : 0;
  }
}

// HOTKEYS
window.addEventListener('keydown', (e) => {
    if(e.code === 'Space') {
        isPaused = !isPaused;
        document.getElementById('status-ui').textContent = isPaused ? 'SYSTEM HALTED' : 'SCANNING';
        document.getElementById('status-ui').style.color = isPaused ? '#fff' : '#33ff55';
    }
});
</script>
