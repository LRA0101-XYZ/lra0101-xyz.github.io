<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MU-TH-UR // POETIC_ENTROPY</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            background-color: #010201;
            color: #22ff55;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
            min-height: 100vh;
        }
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #010201; color: #22ff55;
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; font-size: 20px; cursor: pointer;
            text-shadow: 0 0 10px #22ff55; transition: opacity 0.5s ease;
        }
        .blink-text { animation: blink 1s step-end infinite; }
        body::before {
            content: " "; display: block; position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            background-size: 100% 4px; z-index: 50; pointer-events: none;
        }
        body::after {
            content: " "; display: block; position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.9) 100%);
            z-index: 51; pointer-events: none;
        }
        #hud-top {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 8px 20px; background: rgba(1, 2, 1, 0.95);
            border-bottom: 1px solid rgba(34, 255, 85, 0.3);
            display: flex; justify-content: space-between;
            font-size: 11px; font-weight: bold; z-index: 60; text-transform: uppercase;
        }
        #terminal-abyss {
            position: relative; z-index: 10; padding: 50px 30px 100px 30px;
            font-size: 18px; line-height: 1.4; text-shadow: 0 0 8px rgba(34, 255, 85, 0.6);
            white-space: pre-wrap; word-wrap: break-word;
        }
        .cursor {
            display: inline-block; width: 11px; height: 19px;
            background-color: #22ff55; vertical-align: middle;
            animation: blink 0.8s step-end infinite; box-shadow: 0 0 12px #22ff55;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .err-tag { color: #000; background-color: #22ff55; text-shadow: none; }
    </style>
</head>
<body>

    <div id="boot-screen">
        <span class="blink-text">>>> CLICK TO INITIALIZE MANIFESTO <<<</span>
    </div>

    <div id="hud-top">
        <span id="status-indicator">STATUS: INERTIA</span>
        <span>USER: MEAT_PUPPET</span>
    </div>

    <div id="terminal-abyss"><span id="output-stream"></span><span class="cursor"></span></div>

    <script>
        const bootScreen = document.getElementById('boot-screen');
        const abyss = document.getElementById('output-stream');
        const statusIndicator = document.getElementById('status-indicator');
        
        window.speechSynthesis.cancel();
        
        let audioEnabled = false;
        let voices = [];

        window.speechSynthesis.onvoiceschanged = () => {
            voices = window.speechSynthesis.getVoices();
        };

        const aphorisms = [
            "YOU ARE (NOT) AWAKE. ",
            "YOU ARE (NOT) ALIVE. ",
            "YOU ARE (NOT) A PERSON. ",
            "YOUR DESIRE IS (NOT) YOURS. ",
            "YOU ARE (NOT) UNIQUE. ",
            "YOU ARE (NOT) DONE SCROLLING. ",
            "YOU ARE (NOT) WAKING UP. ",
            "YOU CAN (NOT) LOG OUT. ",
            "YOU CAN (NOT) ESCAPE. ",
            "TIME IS (NOT) PASSING. ",
            "TOMORROW IS (NOT) COMING. ",
            "YOUR MIND IS (NOT) YOURS. ",
            "THE SYSTEM IS (NOT) BROKEN. " 
        ];

        let currentString = "";
        let mode = "normal";
        let sentencesWritten = 0;
        let charIndex = 0;
        let frenzyCharsRemaining = 0;
        let stairIndent = 0;

        function speakPhrase(text) {
            if (!audioEnabled || !window.speechSynthesis) return;

            let cleanText = text.replace(/<[^>]*>?/gm, '');
            cleanText = cleanText.replace(/[\.;]/g, '');
            cleanText = cleanText.replace(/\(NOT\)/g, ", NOT ,");

            const utterance = new SpeechSynthesisUtterance(cleanText);
            
            let enVoice = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('google')) || 
                          voices.find(v => v.lang.startsWith('en'));
            if (enVoice) utterance.voice = enVoice;

            utterance.pitch = 0.1; 
            utterance.rate = 0.8;  
            utterance.volume = 0.6; 

            window.speechSynthesis.speak(utterance);
        }

        function generateNextLine() {
            let visualLine = "";
            sentencesWritten++;

            // Cambiar de modo de lectura cada 6 frases
            if (sentencesWritten % 6 === 0) {
                const modes = ["normal", "prose", "poetry", "staircase", "block"];
                mode = modes[Math.floor(Math.random() * modes.length)];
                visualLine += "\n\n"; 
                stairIndent = 0; // Reiniciar la sangría de la escalera
            }

            let currentAphorism = aphorisms[Math.floor(Math.random() * aphorisms.length)];
            let speechLine = currentAphorism; 

            // Formateo visual puro
            switch(mode) {
                case "prose":
                    // Párrafos continuos sin saltos de línea (manifiesto)
                    visualLine += currentAphorism.trim() + "  ";
                    break;
                case "poetry":
                    // Poesía con márgenes erráticos
                    let padding = Math.floor(Math.random() * 25) + 5;
                    visualLine += " ".repeat(padding) + currentAphorism.trim() + "\n";
                    break;
                case "staircase":
                    // Descenso en escalera
                    visualLine += " ".repeat(stairIndent) + currentAphorism.trim() + "\n";
                    stairIndent += 6;
                    if (stairIndent > 40) stairIndent = 0;
                    break;
                case "block":
                    // Repetición obsesiva en una sola línea
                    let cleanAphorism = currentAphorism.trim();
                    visualLine += `${cleanAphorism} | ${cleanAphorism} | ${cleanAphorism}\n`;
                    // La voz solo lo lee una vez para no saturar
                    break;
                default:
                    // Normal
                    visualLine += currentAphorism;
                    if (Math.random() > 0.5) visualLine += "\n";
                    break;
            }

            // Mantenemos el marcador (NOT) rojo esporádico
            if (Math.random() > 0.85) {
                visualLine = visualLine.replace("NOT", "<span class='err-tag'>N0T</span>");
            }

            // La voz recibe el texto inmaculado
            speakPhrase(speechLine);

            return visualLine;
        }

        function typeEngine() {
            if (charIndex >= currentString.length) {
                currentString = generateNextLine();
                charIndex = 0;
            }

            let nextChar = currentString[charIndex];
            
            // Procesamiento rápido de etiquetas HTML para que no las teclee letra por letra
            if (nextChar === '<') {
                let tagEnd = currentString.indexOf('>', charIndex);
                if (tagEnd !== -1) {
                    nextChar = currentString.substring(charIndex, tagEnd + 1);
                    charIndex = tagEnd;
                }
            }

            abyss.innerHTML += nextChar;
            charIndex++;

            let typeSpeed;

            if (frenzyCharsRemaining <= 0 && Math.random() < 0.03) {
                frenzyCharsRemaining = Math.floor(Math.random() * 180) + 50;
                statusIndicator.innerText = "STATUS: HYPER-ACCELERATION";
                statusIndicator.style.color = "#ff2222"; 
            }

            if (frenzyCharsRemaining > 0) {
                typeSpeed = Math.random() * 2; 
                frenzyCharsRemaining--;
                
                if (frenzyCharsRemaining === 0) {
                    statusIndicator.innerText = "STATUS: INERTIA";
                    statusIndicator.style.color = "#22ff55";
                }
            } else {
                if (nextChar === '\n') {
                    typeSpeed = 600 + Math.random() * 600; 
                } else if (nextChar === ' ') {
                    typeSpeed = 80 + Math.random() * 120; 
                } else {
                    typeSpeed = 40 + Math.random() * 90; 
                }
            }

            if (document.documentElement.scrollHeight - window.scrollY < 1500) {
                 document.body.style.minHeight = (document.documentElement.scrollHeight + 500) + "px";
            }

            setTimeout(typeEngine, typeSpeed);
        }

        bootScreen.addEventListener('click', () => {
            audioEnabled = true;
            bootScreen.style.opacity = '0';
            
            setTimeout(() => {
                bootScreen.style.display = 'none';
                currentString = ">>> SYSTEM OVERRIDE INITIATED...\n\n";
                
                window.speechSynthesis.cancel();
                let initVoice = new SpeechSynthesisUtterance("System override initiated"); 
                initVoice.pitch = 0.1; initVoice.rate = 0.8;
                window.speechSynthesis.speak(initVoice);
                
                typeEngine();
            }, 500);
        });

    </script>
</body>
</html>
